<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تطبيق حجز الملاعب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to bottom, #4CAF50, #f0f0f5);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        body.dark-mode {
            background: linear-gradient(to bottom, #1e1e1e, #121212);
            color: #ffffff;
        }

        /* الشعار */
        .logo {
            margin-top: 20px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards, moveUp 2s ease-in-out 2s forwards;
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        /* حاوية تسجيل الدخول */
        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            margin-top: 200px;
            opacity: 0;
            animation: fadeIn 1s ease-in-out 5s forwards;
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }

        body.dark-mode .login-container {
            background-color: #2c2c2c;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
        }

        .login-container h2 {
            font-size: 30px;
            color: #4CAF50;
            margin-bottom: 20px;
            font-weight: bold;
            transition: color 0.5s ease;
        }

        body.dark-mode .login-container h2 {
            color: #6fbf73;
        }

        /* النموذج */
        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-group {
            margin-bottom: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 18px;
            margin-bottom: 5px;
            color: inherit;
            text-align: right;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: right;
            width: 100%;
            direction: rtl;
            background-color: #f9f9f9;
            transition: border-color 0.5s ease, background-color 0.5s ease;
            font-family: 'Cairo', sans-serif;
        }

        body.dark-mode .form-group input {
            background-color: #3a3a3a;
            border-color: #555;
            color: #ffffff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-left: 45px;
        }

        #togglePassword {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            background: none;
            border: none;
            color: #888;
            transition: color 0.3s;
            padding: 4px;
        }

        #togglePassword:hover {
            color: #4CAF50;
        }

        .login-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.5s ease, transform 0.2s ease, opacity 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .login-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-button .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .login-button.loading .btn-text { display: none; }
        .login-button.loading .spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .signup-link {
            margin-top: 20px;
            font-size: 16px;
            color: inherit;
        }

        .signup-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .copyright {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
        }

        /* رسالة الخطأ */
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
            width: 100%;
        }

        body.dark-mode .error-message {
            background-color: #4a1c1c;
            color: #ff6b6b;
        }

        .error-message.show {
            display: block;
            animation: shakeIn 0.3s ease;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* رسالة النجاح */
        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
            width: 100%;
        }

        body.dark-mode .success-message {
            background-color: #1b3a1b;
            color: #66bb6a;
        }

        .success-message.show {
            display: block;
        }

        /* زر جوجل */
        .google-signin-button {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
            transition: background-color 0.5s ease, transform 0.2s ease;
        }

        .google-signin-button:hover {
            background-color: #357ABD;
            transform: scale(1.02);
        }

        .google-signin-button img {
            width: 20px;
            height: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes moveUp {
            from { top: 50%; }
            to { top: 20px; }
        }

        /* زر تبديل الوضع */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #FFD700;
            opacity: 0;
            transition: opacity 0.5s ease, color 0.5s ease;
            z-index: 50;
        }

        body.dark-mode .theme-toggle {
            color: #FFFFFF;
        }

        .theme-toggle i {
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .theme-toggle .fa-sun {
            opacity: 1;
            transform: rotate(0deg);
        }

        .theme-toggle .fa-moon {
            opacity: 0;
            transform: rotate(-90deg);
            position: absolute;
            top: 0;
            right: 0;
        }

        body.dark-mode .theme-toggle .fa-sun {
            opacity: 0;
            transform: rotate(90deg);
        }

        body.dark-mode .theme-toggle .fa-moon {
            opacity: 1;
            transform: rotate(0deg);
        }

        /* Toast إشعار */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-30px);
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: rgba(211, 47, 47, 0.95);
            color: white;
        }

        .toast.warning {
            background: rgba(255, 160, 0, 0.95);
            color: white;
        }

        .toast.info {
            background: rgba(33, 150, 243, 0.95);
            color: white;
        }

        /* رابط نسخ كلمة المرور المنسية */
        .forgot-link {
            margin-top: 8px;
            width: 100%;
            text-align: left;
        }

        .forgot-link a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .forgot-link a:hover {
            color: #4CAF50;
        }

        /* إخفاء زر جوجل الافتراضي */
        .g_id_signin {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- زر تبديل الوضع -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon"></i>
    </button>

    <!-- إشعار Toast -->
    <div class="toast" id="toast"></div>

    <!-- الشعار -->
    <div class="logo">
        <img id="logoImage" src="/1000067588.png" alt="شعار التطبيق">
    </div>

    <!-- حاوية تسجيل الدخول -->
    <div class="login-container">
        <h2>تسجيل الدخول</h2>
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" placeholder="أدخل البريد الإلكتروني" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
                    <button type="button" id="togglePassword" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="forgot-link">
                    <a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
                </div>
            </div>
            <!-- رسائل -->
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            <!-- زر الإرسال -->
            <button type="submit" class="login-button" id="loginBtn">
                <span class="btn-text">تسجيل الدخول</span>
                <span class="spinner"></span>
            </button>
            <div class="signup-link">
                ليس لديك حساب؟ <a href="/profile.html">إنشاء حساب</a>
            </div>
        </form>

        <!-- زر تسجيل الدخول بجوجل -->
        <button id="googleSignInButton" class="google-signin-button">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo">
            تسجيل الدخول باستخدام جوجل
        </button>
        <!-- حاوية مخفية لزر جوجل الافتراضي -->
        <div id="googleButtonContainer"></div>

        <div class="copyright">
            &copy; 2024 تطبيق كين ماتش. جميع الحقوق محفوظة.
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <!-- مكتبة Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        // === تهيئة Firebase بقاعدة البيانات الجديدة ===
        const firebaseConfig = {
            apiKey: "AIzaSyDaSsBM2GuRlrewSmYRqwA60ZMcJMIIftQ",
            authDomain: "kainmatch.firebaseapp.com",
            projectId: "kainmatch",
            storageBucket: "kainmatch.firebasestorage.app",
            messagingSenderId: "31352105772",
            appId: "1:31352105772:web:16f4043cd987a77ada9a89",
            measurementId: "G-M0PV4Z1PD6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // === عناصر الصفحة ===
        const themeToggle = document.getElementById('themeToggle');
        const logoImage = document.getElementById('logoImage');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // === إدارة الوضع الليلي ===
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            logoImage.src = isDarkMode ? "/1000069661.png" : "/1000067588.png";
        });

        // إظهار زر التبديل بعد انتهاء حركة الشعار
        setTimeout(() => {
            themeToggle.style.opacity = '1';
        }, 4000);

        // === إظهار/إخفاء كلمة المرور ===
        document.getElementById('togglePassword').addEventListener('click', function () {
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // === إشعار Toast ===
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // === إخفاء رسائل الخطأ والنجاح ===
        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        // === تسجيل الدخول بالبريد وكلمة السر عبر Firebase ===
        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();
            hideMessages();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                errorMessage.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور';
                errorMessage.classList.add('show');
                return;
            }

            // حالة التحميل
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;

                    // التحقق من تأكيد البريد الإلكتروني
                    if (!user.emailVerified) {
                        errorMessage.textContent = 'يرجى تأكيد بريدك الإلكتروني أولاً. تحقق من صندوق الوارد أو الرسائل غير المرغوب فيها.';
                        errorMessage.classList.add('show');
                        // إعادة إرسال بريد التأكيد
                        user.sendEmailVerification().then(() => {
                            showToast('تم إعادة إرسال بريد التأكيد', 'info');
                        }).catch(() => {});
                        auth.signOut();
                        return;
                    }

                    // تسجيل الدخول ناجح
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('userId', user.uid);
                    successMessage.textContent = 'تم تسجيل الدخول بنجاح! جاري التحويل...';
                    successMessage.classList.add('show');

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                })
                .catch((error) => {
                    let message = 'حدث خطأ غير متوقع';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            message = 'لا يوجد حساب مرتبط بهذا البريد الإلكتروني';
                            break;
                        case 'auth/wrong-password':
                            message = 'كلمة المرور غير صحيحة';
                            break;
                        case 'auth/invalid-email':
                            message = 'صيغة البريد الإلكتروني غير صحيحة';
                            break;
                        case 'auth/too-many-requests':
                            message = 'تم تجاوز عدد المحاولات. يرجى المحاولة لاحقاً';
                            break;
                        case 'auth/user-disabled':
                            message = 'تم تعطيل هذا الحساب. تواصل مع الدعم';
                            break;
                        case 'auth/network-request-failed':
                            message = 'مشكلة في الاتصال بالإنترنت';
                            break;
                        case 'auth/invalid-credential':
                            message = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                            break;
                    }
                    errorMessage.textContent = message;
                    errorMessage.classList.add('show');
                })
                .finally(() => {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                });
        });

        // === نسيت كلمة المرور ===
        document.getElementById('forgotPasswordLink').addEventListener('click', function (e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email) {
                showToast('أدخل بريدك الإلكتروني أولاً ثم اضغط نسيت كلمة المرور', 'warning');
                emailInput.focus();
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    showToast('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك', 'info');
                })
                .catch((error) => {
                    let message = 'حدث خطأ';
                    if (error.code === 'auth/user-not-found') {
                        message = 'لا يوجد حساب مرتبط بهذا البريد';
                    } else if (error.code === 'auth/network-request-failed') {
                        message = 'مشكلة في الاتصال بالإنترنت';
                    }
                    showToast(message, 'error');
                });
        });

        // === تسجيل الدخول بجوجل ===
        function handleGoogleCredentialResponse(response) {
            if (response.credential) {
                // بناء بيانات الاعتماد من رمز جوجل
                const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
                auth.signInWithCredential(credential)
                    .then((result) => {
                        const user = result.user;
                        localStorage.setItem('loggedIn', 'true');
                        localStorage.setItem('userId', user.uid);
                        localStorage.setItem('userData', JSON.stringify({
                            name: user.displayName,
                            email: user.email,
                            picture: user.photoURL
                        }));
                        window.location.href = "index.html";
                    })
                    .catch((error) => {
                        let message = 'فشل تسجيل الدخول بجوجل';
                        if (error.code === 'auth/account-exists-with-different-credential') {
                            message = 'يوجد حساب بنفس البريد الإلكتروني مسجل بطريقة أخرى';
                        }
                        showToast(message, 'error');
                    });
            }
        }

        window.onload = function () {
            // تهيئة Google Identity Services
            google.accounts.id.initialize({
                client_id: '674743145268-cnflb7morj1am52k64g5coqk0hfbroro.apps.googleusercontent.com',
                callback: handleGoogleCredentialResponse
            });

            //render الزر في حاوية مخفية (للحصول على الوظيفة دون عرض الزر الافتراضي)
            google.accounts.id.renderButton(
                document.getElementById('googleButtonContainer'),
                { theme: 'outline', size: 'large' }
            );

            // ربط الزر المخصص بنقرة جوجل
            document.getElementById('googleSignInButton').addEventListener('click', function () {
                google.accounts.id.prompt((notification) => {
                    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                        // إذا فشل النافذة المنبثقة، نحاول الطريقة الأخرى
                        document.getElementById('googleButtonContainer').querySelector('div').click();
                    }
                });
            });

            // التحقق مما إذا كان المستخدم مسجلاً بالفعل
            auth.onAuthStateChanged((user) => {
                if (user && user.emailVerified) {
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('userId', user.uid);
                }
            });
        };
    </script>
</body>
</html>
