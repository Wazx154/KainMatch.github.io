<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - تطبيق حجز الملاعب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(to bottom, #4CAF50, #f0f0f5);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    text-align: center;
}

.login-container {
    background: #fff;
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    margin-top: 200px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
}

.login-btn {
    background: #4CAF50;
    color: white;
    border: none;
}

.google-btn {
    background: #fff;
    border: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}

.google-btn img {
    width: 20px;
    height: 20px;
}

.error {
    background: #ffebee;
    color: #c62828;
    padding: 10px;
    margin-top: 10px;
    display: none;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="login-container">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="password" id="password" placeholder="كلمة المرور">

<div id="error" class="error"></div>

<button class="login-btn" id="loginBtn">تسجيل الدخول</button>

<button class="google-btn" id="googleBtn">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
تسجيل الدخول بواسطة Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signInWithRedirect,
getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDaSsBM2GuRlrewSmYRqwA60ZMcJMIIftQ",
authDomain: "kainmatch.firebaseapp.com",
projectId: "kainmatch",
storageBucket: "kainmatch.firebasestorage.app",
messagingSenderId: "31352105772",
appId: "1:31352105772:web:16f4043cd987a77ada9a89"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const errorDiv = document.getElementById("error");

// 🔐 Email login
document.getElementById("loginBtn").onclick = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

errorDiv.style.display = "none";

try {
await signInWithEmailAndPassword(auth, email, password);
window.location.href = "index.html";
} catch (error) {
errorDiv.style.display = "block";
errorDiv.textContent = error.message;
}
};

// 🔥 Google login (FIXED)
document.getElementById("googleBtn").onclick = async () => {
errorDiv.style.display = "none";

try {
await signInWithPopup(auth, provider);
window.location.href = "index.html";

} catch (error) {

console.log(error);

if (error.code === "auth/popup-blocked") {
await signInWithRedirect(auth, provider);
} else {
errorDiv.style.display = "block";
errorDiv.textContent = error.message;
}
}
};

// 🔁 redirect support
getRedirectResult(auth)
.then((result) => {
if (result) {
window.location.href = "index.html";
}
})
.catch((error) => {
console.log(error);
});

</script>

</body>
</html>
