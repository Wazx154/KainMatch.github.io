<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(to bottom,#4CAF50,#f0f0f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.login-btn{
background:#4CAF50;
color:#fff;
}

.google-btn{
margin-top:15px;
background:#fff;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.google-btn img{
width:20px;
height:20px;
}

.error{
color:red;
margin-top:10px;
display:none;
}
</style>

</head>

<body>

<div class="container">
<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="password" id="password" placeholder="كلمة المرور">

<button class="login-btn" id="loginBtn">تسجيل الدخول</button>

<button class="google-btn" id="googleBtn">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
تسجيل بواسطة Google
</button>

<div class="error" id="error"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// إعداد Firebase
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "kainmatch.firebaseapp.com",
projectId: "kainmatch",
appId: "1:31352105772:web:16f4043cd987a77ada9a89"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const errorDiv = document.getElementById("error");

// تسجيل الدخول عادي
document.getElementById("loginBtn").onclick = () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)
.then(() => {
window.location.href = "index.html";
})
.catch(() => {
errorDiv.style.display = "block";
errorDiv.textContent = "بيانات غير صحيحة";
});
};

// تسجيل بجوجل (مصلح)
document.getElementById("googleBtn").onclick = async () => {
try {
const result = await signInWithPopup(auth, provider);
const user = result.user;

console.log(user);
window.location.href = "index.html";

} catch (error) {
errorDiv.style.display = "block";

// عرض الخطأ الحقيقي باش تفهم المشكل
errorDiv.textContent = error.message;
}
};
</script>

</body>
</html>
