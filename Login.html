<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - كين ماتش</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(to bottom,#4CAF50,#f0f0f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#4CAF50;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
opacity:0.9;
}

.login-btn{
background:#4CAF50;
color:#fff;
}

.google-btn{
margin-top:15px;
background:#fff;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-weight:bold;
}

.google-btn img{
width:22px;
height:22px;
}

.error{
background:#ffebee;
color:#c62828;
padding:10px;
border-radius:6px;
margin-top:10px;
display:none;
}

.footer{
margin-top:15px;
font-size:13px;
color:#888;
}
</style>

</head>

<body>

<div class="container">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="password" id="password" placeholder="كلمة المرور">

<button class="login-btn" id="loginBtn">تسجيل الدخول</button>

<button class="google-btn" id="googleBtn">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
تسجيل الدخول بواسطة Google
</button>

<div class="error" id="error"></div>

<div class="footer">
ليس لديك حساب؟ <a href="profile.html" style="color:#4CAF50;">إنشاء حساب</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signInWithRedirect,
getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ⚠️ ضع بياناتك الحقيقية هنا
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "kainmatch.firebaseapp.com",
projectId: "kainmatch",
appId: "1:31352105772:web:16f4043cd987a77ada9a89"
};

// تشغيل Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// عناصر الصفحة
const errorDiv = document.getElementById("error");

// ✅ تسجيل الدخول بالبريد
document.getElementById("loginBtn").onclick = async () => {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

errorDiv.style.display = "none";

if(!email || !password){
errorDiv.style.display = "block";
errorDiv.textContent = "يرجى ملء جميع الحقول";
return;
}

try {
await signInWithEmailAndPassword(auth, email, password);
window.location.href = "index.html";
} catch (error) {
errorDiv.style.display = "block";

if(error.code === "auth/invalid-credential"){
errorDiv.textContent = "البريد أو كلمة المرور غير صحيحة";
}else{
errorDiv.textContent = error.message;
}
}
};

// ✅ تسجيل الدخول بجوجل (حل نهائي)
document.getElementById("googleBtn").onclick = async () => {
errorDiv.style.display = "none";

try {
await signInWithPopup(auth, provider);
window.location.href = "index.html";
} catch (error) {

// fallback إذا popup محجوب
if(error.code === "auth/popup-blocked"){
await signInWithRedirect(auth, provider);
}else{
errorDiv.style.display = "block";
errorDiv.textContent = "فشل تسجيل الدخول: " + error.message;
}
}
};

// ✅ دعم redirect (في حالة fallback)
getRedirectResult(auth)
.then((result) => {
if(result){
window.location.href = "index.html";
}
})
.catch((error) => {
errorDiv.style.display = "block";
errorDiv.textContent = error.message;
});

</script>

</body>
</html>
