<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تسجيل الدخول - تطبيق حجز الملاعب</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            font-family: 'Cairo', sans-serif;

            background: linear-gradient(to bottom, #4CAF50, #f0f0f5);

            color: #333;

            display: flex;

            flex-direction: column;

            align-items: center;

            min-height: 100vh;

            text-align: center;

            overflow-x: hidden;

            transition: background 0.5s ease, color 0.5s ease;

        }

        body.dark-mode { background: linear-gradient(to bottom, #1e1e1e, #121212); color: #ffffff; }

        /* === صورة المستخدم بعد تسجيل الدخول بجوجل === */
        .user-avatar-section {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            animation: slideDown 0.4s ease-out forwards;
        }

        .user-avatar-section.visible {
            display: flex;
        }

        .user-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid #4CAF50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.4);
            object-fit: cover;
            background: #e8f5e9;
        }

        /* بديل الصورة عند فشل تحميل صورة جوجل */
        .user-avatar-fallback {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid #4CAF50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.4);
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            font-weight: 700;
        }

        .user-avatar-fallback.visible {
            display: flex;
        }

        .user-avatar-name {
            font-size: 15px;
            font-weight: 700;
            color: #4CAF50;
            direction: rtl;
            text-align: right;
        }

        body.dark-mode .user-avatar-name { color: #66BB6A; }

        /* === رسائل النجاح والخطأ المحسّنة === */
        .message-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            padding: 14px 28px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .message-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .message-toast.hide {
            transform: translateX(-50%) translateY(-120px);
            opacity: 0;
        }

        .message-toast.error {
            background: linear-gradient(135deg, #ff5252, #d32f2f);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .message-toast.success {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .message-toast .toast-icon {
            font-size: 20px;
            animation: iconBounce 0.6s ease;
        }

        @keyframes iconBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* رسالة الخطأ داخل الفورم */
        .error-message {
            background: linear-gradient(135deg, #fff5f5, #ffebee);
            color: #c62828;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 12px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #ffcdd2;
            text-align: right;
            direction: rtl;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            padding: 0 16px;
            margin-top: 0;
            transition: max-height 0.4s ease, opacity 0.4s ease, padding 0.4s ease, margin-top 0.4s ease;
        }

        .error-message.show {
            display: flex;
            max-height: 80px;
            opacity: 1;
            padding: 12px 16px;
            margin-top: 12px;
        }

        .error-message .error-icon {
            font-size: 18px;
            flex-shrink: 0;
            animation: shakeX 0.5s ease;
        }

        body.dark-mode .error-message {
            background: linear-gradient(135deg, #3a1a1a, #2c1515);
            color: #ef9a9a;
            border-color: #5a2020;
        }

        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* === مؤشر التحميل على الزر === */
        .login-button, .google-signin-button {
            position: relative;
            overflow: hidden;
        }

        .login-button.loading, .google-signin-button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .loading .btn-spinner { display: block; }
        .loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* === باقي التنسيقات الأصلية === */
        .logo {

            margin-top: 20px; width: 150px; height: 150px; border-radius: 50%;

            overflow: hidden; position: absolute; top: 50%; left: 50%;

            transform: translate(-50%, -50%); opacity: 0;

            animation: fadeIn 2s ease-in-out forwards, moveUp 2s ease-in-out 2s forwards;

        }

        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .login-container {

            background-color: #fff; padding: 40px; border-radius: 15px;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); width: 90%;

            max-width: 400px; margin-top: 200px; opacity: 0;

            animation: fadeIn 1s ease-in-out 5s forwards;

            transition: background-color 0.5s ease;

        }

        body.dark-mode .login-container { background-color: #2c2c2c; color: #ffffff; }

        .login-container h2 { font-size: 30px; color: #4CAF50; margin-bottom: 20px; }

        body.dark-mode .login-container h2 { color: #66BB6A; }

        .form-group { margin-bottom: 15px; width: 100%; display: flex; flex-direction: column; }

        .form-group label { font-size: 18px; margin-bottom: 5px; text-align: right; }

        .form-group input {

            padding: 12px; border: 1px solid #ddd; border-radius: 8px;

            font-size: 16px; text-align: right; width: 100%; direction: rtl;

            transition: border-color 0.3s ease, box-shadow 0.3s ease;

        }

        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }

        body.dark-mode .form-group input { background-color: #3a3a3a; border-color: #555; color: #fff; }

        .login-button {

            background-color: #4CAF50; color: white; border: none; padding: 15px;

            border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 20px;

            transition: background-color 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease;

        }

        .login-button:hover {
            background-color: #43A047;
            box-shadow: 0 4px 16px rgba(76, 175, 80, 0.4);
            transform: translateY(-1px);
        }

        .login-button:active { transform: translateY(0); }

        .google-signin-button {

            background-color: #ffffff; color: #757575; border: 1px solid #ddd;

            padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer;

            display: flex; align-items: center; justify-content: center; gap: 10px;

            width: 100%; margin-top: 20px; font-family: 'Cairo', sans-serif;

            transition: background-color 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease;

        }

        .google-signin-button:hover {
            background-color: #f5f5f5;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .google-signin-button:active { transform: translateY(0); }

        body.dark-mode .google-signin-button {
            background-color: #3a3a3a;
            border-color: #555;
            color: #ccc;
        }

        body.dark-mode .google-signin-button:hover { background-color: #444; }

        .theme-toggle {

            position: fixed; top: 20px; right: 20px; background: transparent;

            border: none; cursor: pointer; font-size: 24px; color: #FFD700;

            opacity: 0; transition: opacity 0.5s, transform 0.3s ease;

        }

        .theme-toggle:hover { transform: scale(1.15) rotate(20deg); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes moveUp { from { top: 50%; } to { top: 20px; } }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signup-link { margin-top: 15px; }

        .signup-link a {

            color: #4CAF50; text-decoration: none; font-weight: bold;

            transition: color 0.3s ease;

        }

        .signup-link a:hover { color: #2E7D32; text-decoration: underline; }

        body.dark-mode .signup-link a { color: #66BB6A; }

        .copyright { margin-top: 20px; font-size: 12px; color: #888; }

        body.dark-mode .copyright { color: #666; }

    </style>

</head>

<body>



    <!-- رسائل Toast العائمة -->
    <div class="message-toast" id="toastSuccess">
        <span class="toast-icon"><i class="fas fa-check-circle"></i></span>
        <span>تم تسجيل الدخول بنجاح</span>
    </div>

    <div class="message-toast" id="toastError">
        <span class="toast-icon"><i class="fas fa-exclamation-circle"></i></span>
        <span id="toastErrorText">حدث خطأ</span>
    </div>



    <button class="theme-toggle" id="themeToggle">

        <i class="fas fa-sun"></i>

    </button>



    <div class="logo">

        <img id="logoImage" src="/1000067588.png" alt="شعار التطبيق">

    </div>



    <div class="login-container">

        <h2>تسجيل الدخول</h2>

        <!-- صورة المستخدم من جوجل تظهر بعد نجاح تسجيل الدخول -->
        <div class="user-avatar-section" id="userAvatarSection">
            <img class="user-avatar" id="userAvatar" src="" alt="صورة المستخدم">
            <div class="user-avatar-fallback" id="userAvatarFallback">
                <i class="fas fa-user"></i>
            </div>
            <span class="user-avatar-name" id="userAvatarName"></span>
        </div>

        <form class="login-form" id="loginForm">

            <div class="form-group">

                <label for="email">البريد الإلكتروني</label>

                <input type="email" id="email" placeholder="أدخل البريد الإلكتروني" required>

            </div>

            <div class="form-group">

                <label for="password">كلمة المرور</label>

                <div style="position: relative;">

                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>

                    <span id="togglePassword" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px;">👁️</span>

                </div>

            </div>

            <div id="errorMessage" class="error-message">

                <span class="error-icon">⚠️</span>

                <span id="errorText">خطأ في تسجيل الدخول</span>

            </div>

            <button type="submit" class="login-button" id="submitBtn">

                <span class="btn-text">تسجيل الدخول</span>

                <div class="btn-spinner"></div>

            </button>

            <div class="signup-link">

                ليس لديك حساب؟ <a href="/profile.html">إنشاء حساب</a>

            </div>

        </form>



        <button id="googleBtn" class="google-signin-button">

            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">

            <span class="btn-text">تسجيل الدخول بواسطة جوجل</span>

            <div class="btn-spinner"></div>

        </button>



        <div class="copyright">

            © 2024 تطبيق كين ماتش. جميع الحقوق محفوظة.

        </div>

    </div>



    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";



        // إعدادات Firebase الخاصة بك

        const firebaseConfig = {

            apiKey: "AIzaSyDaSsBM2GuRlrewSmYRqwA60ZMcJMIIftQ",

            authDomain: "kainmatch.firebaseapp.com",

            projectId: "kainmatch",

            storageBucket: "kainmatch.firebasestorage.app",

            messagingSenderId: "31352105772",

            appId: "1:31352105772:web:16f4043cd987a77ada9a89",

            measurementId: "G-M0PV4Z1PD6"

        };



        // تهيئة Firebase

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        const provider = new GoogleAuthProvider();



        // --- عناصر الواجهة ---

        const themeToggle = document.getElementById('themeToggle');

        const body = document.body;

        const logoImage = document.getElementById('logoImage');

        const errorDiv = document.getElementById('errorMessage');

        const errorText = document.getElementById('errorText');

        const toastSuccess = document.getElementById('toastSuccess');

        const toastError = document.getElementById('toastError');

        const toastErrorText = document.getElementById('toastErrorText');

        const submitBtn = document.getElementById('submitBtn');

        const googleBtn = document.getElementById('googleBtn');

        const userAvatarSection = document.getElementById('userAvatarSection');

        const userAvatar = document.getElementById('userAvatar');

        const userAvatarFallback = document.getElementById('userAvatarFallback');

        const userAvatarName = document.getElementById('userAvatarName');



        // --- دوال الرسائل المحسّنة ---

        // إظهار رسالة خطأ داخل الفورم
        function showError(message) {

            errorText.textContent = message;

            errorDiv.classList.add('show');

            // إخفاء تلقائي بعد 4 ثوانٍ

            clearTimeout(showError._timer);

            showError._timer = setTimeout(hideError, 4000);

        }



        // إخفاء رسالة الخطأ بتأثير سلس

        function hideError() {

            errorDiv.classList.remove('show');

        }



        // إظهار Toast النجاح من الأعلى

        function showSuccessToast(message) {

            if (message) toastSuccess.querySelector('span:last-child').textContent = message;

            toastSuccess.classList.remove('hide');

            toastSuccess.classList.add('show');

            setTimeout(() => {

                toastSuccess.classList.remove('show');

                toastSuccess.classList.add('hide');

            }, 2500);

        }



        // إظهار Toast الخطأ من الأعلى

        function showErrorToast(message) {

            toastErrorText.textContent = message;

            toastError.classList.remove('hide');

            toastError.classList.add('show');

            setTimeout(() => {

                toastError.classList.remove('show');

                toastError.classList.add('hide');

            }, 3000);

        }



        // --- حل مشكلة صورة جوجل ---

        // عند نجاح تسجيل الدخول بجوجل نعرض صورة المستخدم مع بديل آمن

        function showGoogleUser(user) {

            const photoURL = user.photoURL;

            const displayName = user.displayName || 'مستخدم جوجل';



            userAvatarName.textContent = 'مرحباً، ' + displayName;



            if (photoURL) {

                // إضافة معامل لمنع الكاش وتجاوز مشاكل CORS

                const safeURL = photoURL.split('?')[0] + '?sz=200&nocache=' + Date.now();

                userAvatar.src = safeURL;

                userAvatar.style.display = 'block';

                userAvatarFallback.classList.remove('visible');



                // إذا فشل تحميل الصورة نعرض البديل فوراً

                userAvatar.onerror = function() {

                    userAvatar.style.display = 'none';

                    userAvatarFallback.classList.add('visible');

                };



                // إذا نجح التحميل نتأكد من إخفاء البديل

                userAvatar.onload = function() {

                    userAvatar.style.display = 'block';

                    userAvatarFallback.classList.remove('visible');

                };

            } else {

                // لا توجد صورة — نعرض البديل مباشرة

                userAvatar.style.display = 'none';

                userAvatarFallback.classList.add('visible');

            }



            userAvatarSection.classList.add('visible');

        }



        // --- تبديل الوضع الليلي ---

        themeToggle.addEventListener('click', () => {

            body.classList.toggle('dark-mode');

            const isDarkMode = body.classList.contains('dark-mode');

            logoImage.src = isDarkMode ? "/1000069661.png" : "/1000067588.png";

            themeToggle.innerHTML = isDarkMode

                ? '<i class="fas fa-moon"></i>'

                : '<i class="fas fa-sun"></i>';

        });



        setTimeout(() => { themeToggle.style.opacity = '1'; }, 4000);



        // --- إظهار/إخفاء كلمة المرور ---

        document.getElementById('togglePassword').addEventListener('click', function() {

            const pwd = document.getElementById('password');

            const isPassword = pwd.type === 'password';

            pwd.type = isPassword ? 'text' : 'password';

            this.textContent = isPassword ? '🙈' : '👁️';

        });



        // --- تسجيل الدخول بالبريد والكلمة ---

        document.getElementById('loginForm').addEventListener('submit', (e) => {

            e.preventDefault();

            hideError();



            const email = document.getElementById('email').value.trim();

            const password = document.getElementById('password').value;



            if (!email || !password) {

                showError('يرجى ملء جميع الحقول المطلوبة');

                return;

            }



            // تفعيل مؤشر التحميل

            submitBtn.classList.add('loading');



            signInWithEmailAndPassword(auth, email, password)

                .then((userCredential) => {

                    submitBtn.classList.remove('loading');

                    showSuccessToast('تم تسجيل الدخول بنجاح');

                    // انتقال بعد انتهاء تأثير الرسالة

                    setTimeout(() => {

                        window.location.href = "index.html";

                    }, 1500);

                })

                .catch((error) => {

                    submitBtn.classList.remove('loading');



                    let message = 'حدث خطأ غير متوقع، حاول مرة أخرى';



                    if (error.code === 'auth/user-not-found') {

                        message = 'البريد الإلكتروني غير مسجل في النظام';

                    } else if (error.code === 'auth/wrong-password') {

                        message = 'كلمة المرور غير صحيحة';

                    } else if (error.code === 'auth/invalid-email') {

                        message = 'صيغة البريد الإلكتروني غير صحيحة';

                    } else if (error.code === 'auth/too-many-requests') {

                        message = 'محاولات كثيرة، انتظر قليلاً ثم حاول مجدداً';

                    } else if (error.code === 'auth/invalid-credential') {

                        message = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';

                    }



                    showError(message);

                    showErrorToast(message);

                });

        });



        // --- تسجيل الدخول بجوجل ---

        googleBtn.addEventListener('click', () => {

            hideError();

            googleBtn.classList.add('loading');



            signInWithPopup(auth, provider)

                .then((result) => {

                    googleBtn.classList.remove('loading');

                    const user = result.user;



                    // عرض صورة واسم المستخدم من جوجل

                    showGoogleUser(user);



                    showSuccessToast('مرحباً ' + (user.displayName || '') + '!');



                    setTimeout(() => {

                        window.location.href = "index.html";

                    }, 2000);

                })

                .catch((error) => {

                    googleBtn.classList.remove('loading');



                    let message = 'فشل تسجيل الدخول عبر جوجل';



                    if (error.code === 'auth/popup-closed-by-user') {

                        message = 'تم إغلاق نافذة تسجيل الدخول';

                    } else if (error.code === 'auth/cancelled-popup-request') {

                        message = 'يوجد طلب تسجيل دخول مفتوح بالفعل';

                    } else if (error.code === 'auth/popup-blocked') {

                        message = 'تم حظر النافذة المنبثقة، اسمح بالنوافذ المنبثقة';

                    }



                    showError(message);

                    showErrorToast(message);

                });

        });

    </script>

</body>

</html>
