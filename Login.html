<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - تطبيق حجز الملاعب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(to bottom, #4CAF50, #f0f0f5);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.logo {
    margin-top: 20px;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
}

.logo img {
    width: 100%;
    height: 100%;
}

.login-container {
    background-color: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    margin-top: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #4CAF50;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.login-button {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 10px;
    width: 100%;
    cursor: pointer;
}

.google-signin-button {
    background-color: #fff;
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 8px;
    width: 100%;
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
}

.google-signin-button img {
    width: 22px;
}

.error-message {
    background-color: #ffebee;
    color: #c62828;
    padding: 10px;
    border-radius: 5px;
    margin-top: 10px;
    display: none;
}
</style>

</head>

<body>

<div class="logo">
<img src="/1000067588.png">
</div>

<div class="login-container">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="password" id="password" placeholder="كلمة المرور">

<div id="errorMessage" class="error-message"></div>

<button class="login-button" id="loginBtn">تسجيل الدخول</button>

<button id="googleBtn" class="google-signin-button">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
تسجيل الدخول بواسطة جوجل
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signInWithRedirect,
getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// إعداد Firebase
const firebaseConfig = {
apiKey: "AIzaSyDaSsBM2GuRlrewSmYRqwA60ZMcJMIIftQ",
authDomain: "kainmatch.firebaseapp.com",
projectId: "kainmatch",
storageBucket: "kainmatch.firebasestorage.app",
messagingSenderId: "31352105772",
appId: "1:31352105772:web:16f4043cd987a77ada9a89"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const errorDiv = document.getElementById("errorMessage");

// تسجيل الدخول بالبريد
document.getElementById("loginBtn").onclick = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

errorDiv.style.display = "none";

try {
await signInWithEmailAndPassword(auth, email, password);
window.location.href = "index.html";
} catch (error) {
errorDiv.style.display = "block";
errorDiv.textContent = error.message;
}
};

// تسجيل الدخول بجوجل (مصلح)
document.getElementById('googleBtn').addEventListener('click', async () => {
errorDiv.style.display = 'none';

try {
await signInWithPopup(auth, provider);
window.location.href = "index.html";

} catch (error) {

console.log(error); // 🔥 مهم لمعرفة الخطأ الحقيقي

if (error.code === "auth/popup-blocked") {
await signInWithRedirect(auth, provider);
} else {
errorDiv.style.display = 'block';
errorDiv.textContent = error.message;
}
}
});

// دعم redirect
getRedirectResult(auth)
.then((result) => {
if (result) {
window.location.href = "index.html";
}
})
.catch((error) => {
console.log(error);
errorDiv.style.display = "block";
errorDiv.textContent = error.message;
});

</script>

</body>
</html>
