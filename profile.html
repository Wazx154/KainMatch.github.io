<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>KainMatch App</title>
</head>
<body>

<h2>تسجيل حساب</h2>
<input id="name" placeholder="الاسم"><br>
<input id="email" placeholder="البريد"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>
<input id="phone" placeholder="الهاتف"><br>
<button onclick="register()">تسجيل</button>

<hr>

<h2>الملف الشخصي</h2>
<img id="profilePic" width="100"><br>
<p>الاسم: <span id="p_name"></span></p>
<p>البريد: <span id="p_email"></span></p>
<p>الهاتف: <span id="p_phone"></span></p>
<button onclick="logout()">تسجيل الخروج</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaSsBM2GuRlrewSmYRqwA60ZMcJMIIftQ",
  authDomain: "kainmatch.firebaseapp.com",
  projectId: "kainmatch",
  storageBucket: "kainmatch.firebasestorage.app",
  messagingSenderId: "31352105772",
  appId: "1:31352105772:web:16f4043cd987a77ada9a89",
  measurementId: "G-M0PV4Z1PD6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// تسجيل مستخدم
window.register = async function() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      name,
      email,
      phone,
      createdAt: new Date()
    });

    alert("تم التسجيل بنجاح ✅");
  } catch (error) {
    alert(error.message);
  }
};

// تحميل بيانات المستخدم
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();
      document.getElementById("p_name").textContent = data.name;
      document.getElementById("p_email").textContent = data.email;
      document.getElementById("p_phone").textContent = data.phone;
    }
  }
});

// تسجيل الخروج
window.logout = function() {
  signOut(auth);
};

</script>

</body>
</html>
