<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KainMatch - تسجيل</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<h2>إنشاء حساب</h2>
<input id="name" placeholder="الاسم"><br><br>
<input id="email" placeholder="البريد"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>
<input id="phone" placeholder="الهاتف"><br><br>
<button onclick="register()">تسجيل</button>

<hr>

<h2>الملف الشخصي</h2>
<p>الاسم: <span id="p_name"></span></p>
<p>البريد: <span id="p_email"></span></p>
<p>الهاتف: <span id="p_phone"></span></p>
<button onclick="logout()">تسجيل الخروج</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaSsBM2GuRlrewSmYRqwA60ZMcJMIIftQ",
  authDomain: "kainmatch.firebaseapp.com",
  projectId: "kainmatch",
  storageBucket: "kainmatch.firebasestorage.app",
  messagingSenderId: "31352105772",
  appId: "1:31352105772:web:16f4043cd987a77ada9a89"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// تسجيل
window.register = async function() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // إرسال تأكيد البريد
    await sendEmailVerification(user);

    // حفظ البيانات
    await setDoc(doc(db, "users", user.uid), {
      name,
      email,
      phone,
      verified: false
    });

    Swal.fire("تم التسجيل", "تحقق من بريدك الإلكتروني 📩", "success");

  } catch (error) {
    Swal.fire("خطأ", error.message, "error");
  }
};

// تحميل البيانات
onAuthStateChanged(auth, async (user) => {
  if (user) {
    await user.reload();

    if (!user.emailVerified) {
      Swal.fire("تنبيه", "يجب تأكيد البريد أولاً", "warning");
      return;
    }

    const docSnap = await getDoc(doc(db, "users", user.uid));

    if (docSnap.exists()) {
      const data = docSnap.data();
      document.getElementById("p_name").textContent = data.name;
      document.getElementById("p_email").textContent = data.email;
      document.getElementById("p_phone").textContent = data.phone;
    }
  }
});

// تسجيل الخروج
window.logout = function() {
  signOut(auth);
};

</script>

</body>
</html>
