<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="google8698ec0481bef4a2">
  <title>تطبيق حجز ملعب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Reset & General Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji";
      background: linear-gradient(to bottom, #4CAF50, #f0f0f5);
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* الوضع الليلي */
    body.dark-mode {
      background: linear-gradient(to bottom, #1e1e1e, #121212);
      color: #ffffff;
    }

    body.dark-mode header { background-color: #2c2c2c; }
    body.dark-mode .card { background-color: #2c2c2c; color: #ffffff; box-shadow: 0px 4px 10px rgba(255, 255, 255, 0.1); }
    body.dark-mode table th { background-color: #2c2c2c; }
    body.dark-mode table td { background-color: #3a3a3a; color: #ffffff; }
    body.dark-mode .menu { background-color: #2c2c2c; }
    body.dark-mode .menu a { background-color: rgba(255, 255, 255, 0.1); }

    /* Header Styles */
    header {
      background-color: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto;
      display: block;
    }

    body.dark-mode .logo { content: url('/1000069661.png'); }
    body:not(.dark-mode) .logo { content: url('/1000067588.png'); }

    /* Main Section Styles */
    .section { padding: 20px; text-align: center; flex: 1; }
    .section h1 { font-size: 30px; margin: 20px 0; color: #4CAF50; }

    /* Card Styles */
    .card {
      background-color: #fff;
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 450px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }

    /* Table Styles */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: right; }
    th { background-color: #4CAF50; color: white; }

    /* Floating Button */
    .floating-button {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 0 25px;
      height: 60px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: jump 2s infinite;
      z-index: 99;
    }

    @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Menu Styles */
    .menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100%;
      background-color: #4CAF50;
      color: white;
      padding: 60px 15px 15px;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      font-size: 18px;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .menu a.logout-link { background-color: rgba(255, 0, 0, 0.2); margin-top: 30px; }

    .menu-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      z-index: 1001;
    }

    /* Other Buttons */
    .theme-toggle { position: fixed; top: 20px; right: 20px; background: none; border: none; cursor: pointer; font-size: 24px; color: #FFD700; z-index: 100; }
    .language-toggle { position: fixed; top: 20px; right: 80px; background: #4CAF50; color: white; border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer; z-index: 100; }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      border-radius: 10px;
      visibility: hidden;
      opacity: 0;
      transition: 0.5s;
      z-index: 2000;
    }
    .toast.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>

  <script>
    if (localStorage.getItem('loggedIn') !== 'true') {
      window.location.href = "Login.html";
    }
  </script>

  <button class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i>
  </button>

  <button class="language-toggle" id="languageToggle">
    <span id="languageText">English</span>
  </button>

  <header id="headerText">تطبيق كين ماتش</header>
  <div class="logo"></div>

  <div class="section">
    <h1 id="welcomeText">مرحبًا بك في تطبيق حجز الملاعب! ⚽</h1>
    <p id="descriptionText">نحن هنا لتوفير أفضل تجربة لك في حجز الملاعب الرياضية بكل سهولة. 🎉</p>

    <div class="card" onclick="toggleBookingInfo()">
      <h2 id="myBookingsText">حجوزاتي 📅</h2>
      <div id="bookingInfo" style="display: none; margin-top: 10px;"></div>
    </div>

    <div class="card" onclick="redirectToSportsGear()">
      <h2 id="sportsGearText">شراء الملابس الرياضية 👕</h2>
      <p>اكتشف أحدث المعدات الرياضية لمبارياتك.</p>
    </div>
  </div>

  <button class="floating-button" onclick="redirectToBooking()">
    <i class="fas fa-plus"></i>
    <span id="bookNowText">احجز ملعبك الآن</span>
  </button>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="menu" id="menu">
    <a href="profile.html">
      <i class="fas fa-user-circle"></i>
      <span>الملف الشخصي (البروفيل)</span>
    </a>
    <a href="#" onclick="showInfo(); closeMenu()">
      <i class="fas fa-info-circle"></i>
      <span id="appInfoText">معلومات التطبيق</span>
    </a>
    <a href="#" class="logout-link" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i>
      <span>تسجيل الخروج</span>
    </a>
  </div>

  <div id="toast" class="toast">
    <span id="toastText">تطبيق كين ماتش - الإصدار 1.0 <br> تجربة حجز سهلة وسريعة!</span>
  </div>

  <script>
    // وظيفة تسجيل الخروج
    function logout() {
      localStorage.removeItem('loggedIn');
      window.location.href = "Login.html";
    }

    // إدارة القائمة الجانبية
    function toggleMenu() {
      const menu = document.getElementById('menu');
      const isOpen = menu.style.transform === 'translateX(0px)';
      menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
    }

    function closeMenu() {
      document.getElementById('menu').style.transform = 'translateX(-100%)';
    }

    // إدارة الوضع الليلي
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    // وظائف التوجيه
    function redirectToBooking() { window.location.href = "KainMatch now.html"; }
    function redirectToSportsGear() { window.location.href = "réservation.html"; }

    // عرض معلومات الحجز من localStorage
    function toggleBookingInfo() {
      const infoDiv = document.getElementById('bookingInfo');
      if (infoDiv.style.display === 'none') {
        const data = JSON.parse(localStorage.getItem('bookingData'));
        if (data) {
          infoDiv.innerHTML = `
            <table>
              <tr><th>الملعب</th><td>${data.field}</td></tr>
              <tr><th>التاريخ</th><td>${data.date}</td></tr>
              <tr><th>الوقت</th><td>${data.time}</td></tr>
            </table>`;
        } else {
          infoDiv.innerHTML = "<p>لا توجد حجوزات حالية.</p>";
        }
        infoDiv.style.display = 'block';
      } else {
        infoDiv.style.display = 'none';
      }
    }

    function showInfo() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // إغلاق القائمة عند النقر خارجها
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('menu');
      const btn = document.querySelector('.menu-btn');
      if (!menu.contains(e.target) && e.target !== btn) closeMenu();
    });
  </script>
</body>
</html>
