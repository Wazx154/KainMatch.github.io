<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="google8698ec0481bef4a2">
  <title>KainMatch - الصفحة الرئيسية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* منع وميض الصفحة قبل التحقق من الدخول */
    #main-content { display: none; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f0f0f5;
      color: #333;
      transition: 0.3s;
    }
    body.dark-mode { background: #121212; color: #ffffff; }

    /* الهيدر */
    header {
      background: #4CAF50;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* القائمة الجانبية */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 1000;
      top: 0;
      right: 0;
      background-color: #1a1a1a;
      overflow-x: hidden;
      transition: 0.5s;
      padding-top: 20px;
      box-shadow: -2px 0 10px rgba(0,0,0,0.5);
    }
    .sidebar.active { width: 280px; }

    /* الملف الشخصي داخل القائمة */
    .profile-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
      margin-bottom: 15px;
    }
    .profile-header img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #4CAF50;
      object-fit: cover;
      margin-bottom: 10px;
    }
    .profile-header h3 { color: #fff; font-size: 18px; }
    .profile-header p { color: #aaa; font-size: 13px; }

    .sidebar a {
      padding: 15px 25px;
      text-decoration: none;
      font-size: 17px;
      color: #ccc;
      display: block;
      transition: 0.3s;
      text-align: right;
    }
    .sidebar a i { margin-left: 10px; width: 25px; }
    .sidebar a:hover { background: #333; color: #4CAF50; }

    .logout-btn { color: #ff4d4d !important; border-top: 1px solid #333; margin-top: 20px; }

    /* المحتوى الرئيسي */
    .hero {
      padding: 50px 20px;
      text-align: center;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 500px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    body.dark-mode .card { background: #1e1e1e; }

    .btn-main {
      display: inline-block;
      padding: 12px 30px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      margin-top: 15px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    .overlay.active { display: block; }
  </style>
</head>
<body>

<script>
  // التحقق الفوري من تسجيل الدخول قبل رندر الصفحة
  (function() {
    const isLoggedIn = localStorage.getItem('loggedIn');
    if (isLoggedIn !== 'true') {
      window.location.href = 'Login.html';
    }
  })();
</script>

<div id="main-content">
  <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

  <div id="mySidebar" class="sidebar">
    <div class="profile-header">
      <img id="sideProfileImg" src="https://via.placeholder.com/90" alt="User">
      <h3 id="sideProfileName">مستخدم</h3>
      <p id="sideProfileEmail">email@example.com</p>
    </div>
    
    <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
    <a href="profile.html"><i class="fas fa-user-circle"></i> الملف الشخصي</a>
    <a href="KainMatch now.html"><i class="fas fa-plus-circle"></i> حجز ملعب جديد</a>
    <a href="réservation.html"><i class="fas fa-tshirt"></i> المتجر الرياضي</a>
    
    <a href="#" class="logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
    </a>
  </div>

  <header>
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">
      <i class="fas fa-bars"></i>
    </div>
    <h2 style="font-weight: bold;">KainMatch</h2>
    <div onclick="toggleTheme()" style="cursor:pointer; font-size: 20px;">
      <i id="themeIcon" class="fas fa-moon"></i>
    </div>
  </header>

  <div class="hero">
    <h1>مرحباً بك مجدداً!</h1>
    <p>تطبيقك المتكامل لحجز ملاعب كرة القدم في المغرب</p>
    
    <div class="card">
      <h3>جاهز للمباراة القادمة؟</h3>
      <p>قم بحجز ملعبك المفضل الآن في أقل من دقيقة.</p>
      <a href="KainMatch now.html" class="btn-main">احجز الآن</a>
    </div>
  </div>
</div>

<script>
  // إظهار المحتوى بعد التأكد من تسجيل الدخول
  document.getElementById('main-content').style.display = 'block';

  function toggleSidebar() {
    const sidebar = document.getElementById("mySidebar");
    const overlay = document.getElementById("overlay");
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
  }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const icon = document.getElementById('themeIcon');
    if (document.body.classList.contains('dark-mode')) {
      icon.classList.replace('fa-moon', 'fa-sun');
    } else {
      icon.classList.replace('fa-sun', 'fa-moon');
    }
  }

  function loadUserData() {
    const userData = JSON.parse(localStorage.getItem('userData'));
    if (userData) {
      document.getElementById('sideProfileName').innerText = userData.name || 'مستخدم';
      document.getElementById('sideProfileEmail').innerText = userData.email || '';
      if (userData.picture) {
        document.getElementById('sideProfileImg').src = userData.picture;
      }
    }
  }

  function logout() {
    if (confirm("هل تريد تسجيل الخروج فعلاً؟")) {
      localStorage.removeItem('loggedIn');
      window.location.href = 'Login.html';
    }
  }

  // تنفيذ عند تحميل الصفحة
  window.onload = loadUserData;
</script>

</body>
</html>
