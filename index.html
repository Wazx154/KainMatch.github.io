<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الرئيسية</title>

<style>
body{
  font-family: Arial;
  margin:0;
}

/* القائمة */
.menu{
  position:fixed;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:#4CAF50;
  color:white;
  transform:translateX(-100%);
  transition:0.4s;
  padding:15px;
}

/* زر القائمة */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:25px;
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px;
  border-radius:50%;
}

/* البروفايل */
.profile-sidebar-info{
  text-align:center;
  margin-bottom:20px;
}

.profile-sidebar-info img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:3px solid white;
}

.profile-sidebar-info h3{
  margin:10px 0 5px;
}

.profile-sidebar-info p{
  font-size:14px;
}

/* الروابط */
.menu a{
  display:block;
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.2);
  border-radius:8px;
  text-decoration:none;
  color:white;
}

/* تسجيل الخروج */
.logout{
  position:absolute;
  bottom:20px;
  width:90%;
  background:red;
  text-align:center;
}
</style>
</head>

<body>

<!-- 🔐 حماية الصفحة -->
<script>
if(!localStorage.getItem("isLoggedIn")){
  window.location.href = "Login.html";
}
</script>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="menu" id="menu">

  <!-- 👤 البروفايل -->
  <div class="profile-sidebar-info">
    <img src="https://i.imgur.com/6VBx3io.png">
    <h3 id="username"></h3>
    <p id="email"></p>
  </div>

  <a href="#">الرئيسية</a>
  <a href="#">حجوزاتي</a>

  <!-- 🚪 تسجيل الخروج -->
  <a href="#" class="logout" onclick="logout()">تسجيل الخروج</a>

</div>

<h1 style="text-align:center;margin-top:100px;">مرحبا بك 👋</h1>

<script>
/* فتح واغلاق القائمة */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.transform =
    menu.style.transform === "translateX(0px)"
    ? "translateX(-100%)"
    : "translateX(0)";
}

/* تحميل بيانات المستخدم */
document.getElementById("username").innerText =
  localStorage.getItem("username") || "User";

document.getElementById("email").innerText =
  localStorage.getItem("email") || "email@example.com";

/* تسجيل الخروج */
function logout(){
  localStorage.removeItem("isLoggedIn");
  window.location.href = "Login.html";
}
</script>

</body>
</html>
