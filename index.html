<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تطبيق حجز ملعب - الصفحة الرئيسية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* التحقق من تسجيل الدخول قبل عرض أي شيء */
    #main-wrapper { display: none; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #f0f0f5; color: #333; }
    body.dark-mode { background: #121212; color: #fff; }

    /* القائمة الجانبية المحدثة */
    .sidebar {
      height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0;
      background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 20px;
    }
    .sidebar.active { width: 280px; }

    /* قسم الملف الشخصي داخل القائمة */
    .user-profile-section {
      padding: 20px; text-align: center; border-bottom: 1px solid #333; margin-bottom: 10px;
    }
    .user-profile-section img {
      width: 80px; height: 80px; border-radius: 50%; border: 2px solid #4CAF50; object-fit: cover;
    }
    .user-profile-section h3 { color: white; font-size: 16px; margin-top: 10px; }
    .user-profile-section p { color: #888; font-size: 12px; }

    .sidebar a {
      padding: 15px 25px; text-decoration: none; font-size: 18px; color: #818181;
      display: block; transition: 0.3s; text-align: right;
    }
    .sidebar a:hover { color: #f1f1f1; background: #222; }
    .sidebar .logout-btn { color: #ff4d4d; border-top: 1px solid #333; margin-top: 20px; }

    header {
      background: #4CAF50; color: white; padding: 15px; display: flex;
      justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .menu-icon { font-size: 24px; cursor: pointer; }
    .content { padding: 20px; text-align: center; }
  </style>
</head>
<body>

<script>
  // ميزة التحقق من التسجيل قبل تحميل الصفحة
  (function() {
    const loggedIn = localStorage.getItem('loggedIn');
    if (loggedIn !== 'true') {
      window.location.href = 'Login.html';
    }
  })();
</script>

<div id="main-wrapper">
  <div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="toggleSidebar()">&times;</a>
    
    <div class="user-profile-section" id="userProfile">
      <img id="userImg" src="https://via.placeholder.com/80" alt="User">
      <h3 id="userName">جاري التحميل...</h3>
      <p id="userEmail">email@example.com</p>
    </div>

    <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
    <a href="profile.html"><i class="fas fa-user-edit"></i> تعديل الملف</a>
    <a href="KainMatch now.html"><i class="fas fa-calendar-check"></i> حجوزاتي</a>
    
    <a href="#" class="logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
    </a>
  </div>

  <header>
    <div class="menu-icon" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <h2>KainMatch</h2>
    <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
  </header>

  <div class="content">
    <h1>مرحباً بك في تطبيق حجز الملاعب</h1>
    <p>اختر ملعبك المفضل وابدأ اللعب الآن!</p>
  </div>
</div>

<script>
  // إظهار الصفحة بعد التحقق
  document.getElementById('main-wrapper').style.display = 'block';

  function toggleSidebar() {
    document.getElementById("mySidebar").classList.toggle("active");
  }

  // تحميل بيانات الملف الشخصي
  function loadUserData() {
    const userData = JSON.parse(localStorage.getItem('userData'));
    if (userData) {
      document.getElementById('userName').innerText = userData.name || 'مستخدم جديد';
      document.getElementById('userEmail').innerText = userData.email || '';
      if (userData.picture) {
        document.getElementById('userImg').src = userData.picture;
      }
    }
  }

  // ميزة تسجيل الخروج
  function logout() {
    if(confirm("هل أنت متأكد من تسجيل الخروج؟")) {
      localStorage.removeItem('loggedIn');
      // يمكنك إبقاء userData أو مسحه حسب رغبتك
      window.location.href = 'Login.html';
    }
  }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
  }

  window.onload = loadUserData;
</script>

</body>
</html>
