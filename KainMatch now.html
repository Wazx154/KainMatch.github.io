<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز ملعب كرة القدم</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* تم تحسين التنسيق لضمان تجربة مستخدم سلسة */
    body { font-family: 'Segoe UI', sans-serif; background: #282c34; color: #fff; display: flex; justify-content: center; padding: 20px; }
    .container { background: #3b3f47; padding: 20px; border-radius: 10px; width: 100%; max-width: 450px; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; }
    button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    #message { padding: 10px; margin-top: 10px; border-radius: 5px; display: none; text-align: center; }
    .success { background: #2e7d32; }
    .error { background: #c62828; }
  </style>
</head>
<body>

<div class="container">
  <h1>حجز ملعب كرة القدم</h1>
  <form id="bookingForm">
    <input type="text" id="name" placeholder="الاسم والنسب" required>
    <input type="number" id="age" placeholder="العمر" min="18" max="70" required>
    <input type="text" id="idCard" placeholder="رقم البطاقة الوطنية" required>
    <input type="date" id="date" required>
    <input type="time" id="time" required>
    
    <select id="teamStatus" onchange="toggleTeam()">
      <option value="وحده">حجز فردي</option>
      <option value="مع فريق">حجز مع فريق</option>
    </select>

    <div id="teamFields" style="display:none;">
      <input type="number" id="teamSize" placeholder="عدد أفراد الفريق (2-12)" min="2" max="12">
    </div>

    <select id="field">
      <option value="ملعب حي السلام">ملعب حي السلام</option>
      <option value="ملعب قاعة المغطات">ملعب قاعة المغطات</option>
    </select>

    <button type="button" id="submitBtn" onclick="sendBooking()">تأكيد الحجز</button>
  </form>
  <div id="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  (function() { emailjs.init("Pw4nQhcJsLJvfqtrt"); })();

  function toggleTeam() {
    const status = document.getElementById("teamStatus").value;
    document.getElementById("teamFields").style.display = (status === "مع فريق") ? "block" : "none";
  }

  function sendBooking() {
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("message");
    
    // تجميع البيانات
    const templateParams = {
      name: document.getElementById("name").value,
      age: document.getElementById("age").value,
      idCard: document.getElementById("idCard").value,
      date: document.getElementById("date").value,
      time: document.getElementById("time").value,
      teamStatus: document.getElementById("teamStatus").value,
      field: document.getElementById("field").value
    };

    btn.disabled = true;
    btn.innerText = "جاري الإرسال...";

    // الإرسال
    emailjs.send("service_gn9yb8t", "template_rdl06xl", templateParams)
      .then(() => {
        msg.textContent = "تم الحجز بنجاح!";
        msg.className = "success";
        msg.style.display = "block";
        btn.disabled = false;
      })
      .catch((err) => {
        msg.textContent = "فشل الإرسال: " + JSON.stringify(err);
        msg.className = "error";
        msg.style.display = "block";
        btn.disabled = false;
      });
  }
</script>
</body>
</html>
