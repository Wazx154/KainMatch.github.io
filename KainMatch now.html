<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز ملعب كرة القدم</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #282c34;
      color: #fff;
      transition: background-color 0.3s ease;
    }

    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }

    .container {
      background-color: #3b3f47;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      text-align: center;
      width: 100%;
      max-width: 450px;
      margin: 20px;
    }

    body.dark-mode .container {
      background-color: #1e1e1e;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    h1 { margin-bottom: 15px; color: #4CAF50; font-size: 24px; }
    .logo { width: 120px; margin-bottom: 10px; border-radius: 50%; }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      text-align: right;
    }

    .input-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-group div { width: 100%; }

    select, input {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 6px;
      background-color: #fff;
      color: #333;
      box-sizing: border-box;
      font-size: 14px;
    }

    body.dark-mode input, body.dark-mode select {
      background-color: #2c2c2c;
      color: #fff;
      border: 1px solid #444;
    }

    button#bookButton {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      transition: 0.3s;
    }

    button#bookButton:hover { background-color: #45a049; transform: translateY(-2px); }

    /* تحسين رسالة التنبيه */
    #message {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn { from { opacity: 0; top: 0; } to { opacity: 1; top: 20px; } }

    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .team-cards-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    /* زر تبديل الوضع */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #4CAF50;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* إخفاء إحدى الأيقونات بناءً على الوضع */
    body.dark-mode .fa-moon { display: none; }
    body:not(.dark-mode) .fa-sun { display: none; }

  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" title="تبديل الوضع">
    <i class="fas fa-sun"></i>
    <i class="fas fa-moon"></i>
  </button>

  <div class="container">
    <img src="1000069661.png" alt="شعار" class="logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
    <h1 id="pageTitle">حجز ملعب كرة القدم</h1>
    
    <form id="bookingForm">
      <div class="input-group">
        <div>
          <label for="name" id="nameLabel">الاسم والنسب:</label>
          <input type="text" id="name" placeholder="أدخل الاسم الكامل" required>
        </div>
        <div>
          <label for="age" id="ageLabel">العمر:</label>
          <input type="number" id="age" min="18" max="70" placeholder="18-70" required onchange="checkAge()">
        </div>
      </div>

      <div id="idCardField" style="display: none;">
        <label for="idCard" id="idCardLabel">رقم البطاقة الوطنية:</label>
        <input type="text" id="idCard" placeholder="مثال: AB123456">
      </div>

      <div class="input-group">
        <div>
          <label for="date" id="dateLabel">تاريخ الحجز:</label>
          <input type="date" id="date" required>
        </div>
        <div>
          <label for="time" id="timeLabel">وقت الحجز:</label>
          <input type="time" id="time" required>
        </div>
      </div>

      <label for="teamStatus" id="teamStatusLabel">نوع الحجز:</label>
      <select id="teamStatus" onchange="toggleTeamSizeField()" required>
        <option value="وحده" id="aloneOption">فردي</option>
        <option value="مع فريق" id="teamOption">مع فريق</option>
      </select>

      <div id="teamSizeField" style="display: none;">
        <label for="teamSize" id="teamSizeLabel">عدد أفراد الفريق (2-12):</label>
        <input type="number" id="teamSize" min="2" max="12" oninput="showTeamCardsField()">
      </div>

      <div id="teamCardsField" style="display: none;">
        <label id="teamCardsLabel">أرقام بطاقات اللاعبين:</label>
        <div class="team-cards-group"></div>
      </div>

      <label for="field" id="fieldLabel">اختر الملعب:</label>
      <select id="field" required>
        <option value="ملعب حي السلام">ملعب حي السلام</option>
        <option value="ملعب قاعة المغطات">ملعب قاعة المغطات</option>
        <option value="ملعب حي النهضة">ملعب حي النهضة</option>
        <option value="ملعب حي الغفران">ملعب حي الغفران</option>
      </select>

      <label for="position" id="positionLabel">مركزك في اللعب:</label>
      <select id="position" required>
        <option value="حارس مرمى">حارس مرمى</option>
        <option value="مدافع">مدافع</option>
        <option value="وسط">وسط</option>
        <option value="مهاجم">مهاجم</option>
      </select>

      <button type="button" onclick="bookField()" id="bookButton">تأكيد الحجز</button>
    </form>
    <div id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    // تهيئة EmailJS
    (function() { emailjs.init("Pw4nQhcJsLJvfqtrt"); })();

    // الوضع الليلي
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    });

    // تحديد نطاق التاريخ (اليوم إلى شهر من الآن)
    window.onload = function() {
      const dateField = document.getElementById("date");
      const today = new Date().toISOString().split("T")[0];
      dateField.min = today;
    }

    function checkAge() {
      const age = parseInt(document.getElementById("age").value);
      const idField = document.getElementById("idCardField");
      if (age >= 18) {
        idField.style.display = "block";
      } else {
        idField.style.display = "none";
        showMessage("يجب أن يكون العمر 18 سنة فما فوق", "error");
      }
    }

    function toggleTeamSizeField() {
      const isTeam = document.getElementById("teamStatus").value === "مع فريق";
      document.getElementById("teamSizeField").style.display = isTeam ? "block" : "none";
      if(!isTeam) document.getElementById("teamCardsField").style.display = "none";
    }

    function showTeamCardsField() {
      const size = parseInt(document.getElementById("teamSize").value);
      const container = document.querySelector('.team-cards-group');
      const parent = document.getElementById("teamCardsField");
      
      container.innerHTML = '';
      if (size >= 2 && size <= 12) {
        parent.style.display = "block";
        for (let i = 1; i <= size; i++) {
          const input = document.createElement('input');
          input.type = "text";
          input.id = `teamCard${i}`;
          input.placeholder = `بطاقة لاعب ${i}`;
          input.required = true;
          container.appendChild(input);
        }
      } else {
        parent.style.display = "none";
      }
    }

    function showMessage(text, type) {
      const msg = document.getElementById("message");
      msg.textContent = text;
      msg.className = type;
      msg.style.display = "block";
      setTimeout(() => msg.style.display = "none", 3000);
    }

    function bookField() {
      const btn = document.getElementById("bookButton");
      const fields = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        idCard: document.getElementById("idCard").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        teamStatus: document.getElementById("teamStatus").value,
        field: document.getElementById("field").value
      };

      if (!fields.name || !fields.date || !fields.time || (fields.age >= 18 && !fields.idCard)) {
        showMessage("الرجاء إكمال كافة البيانات المطلوبة", "error");
        return;
      }

      // التحقق من الوقت (8 صباحاً - 10 مساءً)
      const hour = parseInt(fields.time.split(":")[0]);
      if (hour < 8 || hour >= 22) {
        showMessage("الملاعب متاحة فقط من 8:00 صباحاً حتى 10:00 مساءً", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "جاري الإرسال...";

      const teamCards = [];
      if (fields.teamStatus === "مع فريق") {
        const size = document.getElementById("teamSize").value;
        for (let i = 1; i <= size; i++) {
          teamCards.push(document.getElementById(`teamCard${i}`).value);
        }
      }

      const templateParams = { ...fields, teamCards: teamCards.join(', ') };
      const templateID = fields.teamStatus === "وحده" ? "template_rdl06xl" : "template_khnhk2h";

      emailjs.send("service_gn9yb8t", templateID, templateParams)
        .then(() => {
          showMessage("✅ تم الحجز بنجاح! سنتواصل معك قريباً", "success");
          document.getElementById("bookingForm").reset();
          btn.disabled = false;
          btn.textContent = "تأكيد الحجز";
        })
        .catch((err) => {
          showMessage("❌ فشل الإرسال، تحقق من الاتصال", "error");
          btn.disabled = false;
          btn.textContent = "تأكيد الحجز";
        });
    }
  </script>
</body>
</html>
